<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d6a9f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5bbfea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a7abf;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a8e6df;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b3dff5;stop-opacity:1"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="195"/>
    </clipPath>
  </defs>

  <!-- Outer ring segments (circuit board style) -->
  <g fill="none" stroke="#3a6fa8" stroke-width="2">
    <!-- Outer ring base -->
    <circle cx="256" cy="256" r="245" fill="#1e3f6e" stroke="none"/>
    <!-- Segment dividers -->
    <circle cx="256" cy="256" r="220" fill="none" stroke="#2d5a9e" stroke-width="1"/>
  </g>

  <!-- Circuit board segments around the ring -->
  <g>
    <!-- Top segments -->
    <path d="M 206 14 A 245 245 0 0 1 306 14 L 296 50 A 205 205 0 0 0 216 50 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 146 35 A 245 245 0 0 1 200 16 L 212 52 A 205 205 0 0 0 164 68 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 306 14 A 245 245 0 0 1 360 35 L 348 68 A 205 205 0 0 0 300 50 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>

    <!-- Left segments -->
    <path d="M 14 206 A 245 245 0 0 0 14 306 L 50 296 A 205 205 0 0 1 50 216 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 35 146 A 245 245 0 0 0 16 200 L 52 212 A 205 205 0 0 1 68 164 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 16 312 A 245 245 0 0 0 35 366 L 68 348 A 205 205 0 0 1 52 300 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>

    <!-- Right segments -->
    <path d="M 498 206 A 245 245 0 0 1 498 306 L 462 296 A 205 205 0 0 0 462 216 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 477 146 A 245 245 0 0 1 496 200 L 460 212 A 205 205 0 0 0 444 164 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 496 312 A 245 245 0 0 1 477 366 L 444 348 A 205 205 0 0 0 460 300 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>

    <!-- Bottom segments -->
    <path d="M 206 498 A 245 245 0 0 0 306 498 L 296 462 A 205 205 0 0 1 216 462 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 146 477 A 245 245 0 0 0 200 496 L 212 460 A 205 205 0 0 1 164 444 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
    <path d="M 306 498 A 245 245 0 0 0 360 477 L 348 444 A 205 205 0 0 1 300 462 Z" fill="#2a4f7c" stroke="#3d6fa8" stroke-width="1.5"/>
  </g>

  <!-- Small circuit dots on segments -->
  <g fill="#6aaed6">
    <circle cx="256" cy="24" r="5"/>
    <circle cx="256" cy="488" r="5"/>
    <circle cx="24" cy="256" r="5"/>
    <circle cx="488" cy="256" r="5"/>
    <circle cx="102" cy="60" r="4"/>
    <circle cx="410" cy="60" r="4"/>
    <circle cx="60" cy="410" r="4"/>
    <circle cx="452" cy="410" r="4"/>
  </g>

  <!-- Inner circle background -->
  <circle cx="256" cy="256" r="195" fill="url(#bgGrad)"/>

  <!-- Water waves (clipped to inner circle) -->
  <g clip-path="url(#circleClip)">
    <!-- Deep water base -->
    <rect x="61" y="310" width="390" height="141" fill="#1565a0"/>

    <!-- Wave 1 (back) -->
    <path d="M 61 290 Q 130 255 200 280 Q 270 305 340 270 Q 400 245 451 265 L 451 380 L 61 380 Z" fill="#1976d2" opacity="0.8"/>

    <!-- Wave 2 (front large) -->
    <path d="M 61 320 Q 100 270 160 295 Q 210 315 260 285 Q 310 258 360 278 Q 410 298 451 270 L 451 420 L 61 420 Z" fill="url(#waveGrad)" opacity="0.9"/>

    <!-- Curling wave crest -->
    <path d="M 120 220 Q 160 160 220 180 Q 260 195 270 170 Q 280 145 260 130 Q 230 112 200 140 Q 175 165 190 190 Q 200 205 220 200" fill="url(#waveGrad)" stroke="#7dd4f8" stroke-width="3"/>

    <!-- Wave highlight lines -->
    <path d="M 100 310 Q 140 295 180 308 Q 220 320 260 305 Q 300 290 340 302" fill="none" stroke="#5bbfea" stroke-width="2.5" opacity="0.6"/>
    <path d="M 80 340 Q 130 328 170 340 Q 210 352 250 337 Q 290 322 330 335" fill="none" stroke="#7dd4f8" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Circuit data line on wave -->
  <g clip-path="url(#circleClip)">
    <path d="M 80 295 L 120 295 L 140 270 L 180 310 L 220 275 L 260 300 L 300 268 L 340 288 L 380 260 L 420 280" fill="none" stroke="#a0d8ef" stroke-width="2.5" opacity="0.8"/>
    <!-- Data dots -->
    <circle cx="120" cy="295" r="5" fill="#7dd4f8"/>
    <circle cx="180" cy="310" r="5" fill="#7dd4f8"/>
    <circle cx="220" cy="275" r="5" fill="#7dd4f8"/>
    <circle cx="300" cy="268" r="5" fill="#7dd4f8"/>
    <circle cx="380" cy="260" r="5" fill="#7dd4f8"/>
  </g>

  <!-- Water level gauge -->
  <g clip-path="url(#circleClip)">
    <rect x="330" y="175" width="28" height="165" rx="4" fill="url(#gaugeGrad)" stroke="#2ec4b6" stroke-width="2"/>
    <!-- Gauge fill level -->
    <rect x="332" y="260" width="24" height="78" rx="3" fill="#1a9a8e" opacity="0.6"/>
    <!-- Tick marks -->
    <line x1="358" y1="215" x2="372" y2="215" stroke="#1a3a5c" stroke-width="2.5"/>
    <line x1="358" y1="240" x2="369" y2="240" stroke="#1a3a5c" stroke-width="1.5"/>
    <line x1="358" y1="265" x2="372" y2="265" stroke="#1a3a5c" stroke-width="2.5"/>
    <line x1="358" y1="290" x2="369" y2="290" stroke="#1a3a5c" stroke-width="1.5"/>
    <line x1="358" y1="315" x2="372" y2="315" stroke="#1a3a5c" stroke-width="2.5"/>
    <!-- Numbers -->
    <text x="374" y="220" font-family="Arial" font-size="16" fill="#c8eef8" font-weight="bold">3</text>
    <text x="374" y="270" font-family="Arial" font-size="16" fill="#c8eef8" font-weight="bold">2</text>
    <text x="374" y="320" font-family="Arial" font-size="16" fill="#c8eef8" font-weight="bold">1</text>
  </g>

  <!-- Cloud upload icon -->
  <g clip-path="url(#circleClip)">
    <!-- Cloud body -->
    <path d="M 310 195 Q 310 165 335 162 Q 340 140 362 142 Q 378 118 400 128 Q 422 118 435 138 Q 458 138 458 162 Q 475 165 475 185 Q 475 205 455 205 L 330 205 Q 310 205 310 195 Z" fill="url(#cloudGrad)" stroke="#a0cfe8" stroke-width="1.5"/>
    <!-- Upload arrow -->
    <line x1="392" y1="198" x2="392" y2="168" stroke="#2d6a9f" stroke-width="4" stroke-linecap="round"/>
    <path d="M 378 180 L 392 162 L 406 180" fill="none" stroke="#2d6a9f" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Speed lines -->
    <line x1="370" y1="188" x2="358" y2="188" stroke="#2d6a9f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="366" y1="196" x2="352" y2="196" stroke="#2d6a9f" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Inner ring highlight -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#5a9fd4" stroke-width="2.5" opacity="0.5"/>
</svg>
