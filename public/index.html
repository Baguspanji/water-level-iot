<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Level Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        /* ── Header ── */
        header {
            height: 46px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 .9rem;
            flex-shrink: 0;
        }

        .header-title {
            font-size: .95rem;
            font-weight: 700;
            color: #38bdf8;
        }

        .header-title span {
            color: #64748b;
            font-weight: 400;
            font-size: .75rem;
            margin-left: .35rem;
        }

        #conn {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: .72rem;
            color: #94a3b8;
        }

        #dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ef4444;
            transition: background .3s;
        }

        #dot.ok { background: #22c55e; }

        /* ── Stats bar ── */
        #stats-bar {
            height: 34px;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 .75rem;
            flex-shrink: 0;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: .35rem;
            font-size: .7rem;
        }

        .stat-label { color: #475569; }

        .stat-val { font-weight: 700; color: #cbd5e1; }
        .stat-val.ok { color: #22c55e; }
        .stat-val.off { color: #64748b; }
        .stat-val.danger { color: #f87171; }

        .stat-sep {
            width: 1px;
            height: 14px;
            background: #1e293b;
        }

        #clock {
            margin-left: auto;
            font-size: .68rem;
            color: #334155;
            font-variant-numeric: tabular-nums;
        }

        /* ── Workspace ── */
        #workspace {
            height: calc(100vh - 80px); /* header 46 + stats 34 */
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 250px;
            flex-shrink: 0;
            background: #0a1120;
            border-right: 1px solid #1e293b;
            overflow-y: auto;
            padding: .5rem;
            display: flex;
            flex-direction: column;
            gap: .4rem;
        }

        .sidebar-hdr {
            font-size: .62rem;
            font-weight: 700;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: .07em;
            padding: .2rem .3rem;
        }

        /* ── Device card (compact) ── */
        .dcard {
            background: #1e293b;
            border: 1px solid #2d3f55;
            border-radius: 9px;
            padding: .55rem .65rem;
            cursor: pointer;
            transition: border-color .18s, background .18s;
            position: relative;
        }

        .dcard:hover { border-color: #38bdf860; }
        .dcard.active { border-color: #38bdf8; background: #1a3348; }
        .dcard.offline { opacity: .5; }

        .dcard.risk-warn { border-color: #f59e0b80; }
        .dcard.risk-danger {
            border-color: #ef444480;
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: #ef444440; }
            50%       { border-color: #ef4444cc; }
        }

        .dcard-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: .35rem;
        }

        .dcard-name {
            font-size: .8rem;
            font-weight: 600;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 138px;
        }

        .dcard-id { font-size: .62rem; color: #475569; margin-top: 1px; }

        .dcard-actions { display: flex; align-items: center; gap: 3px; }

        .edit-btn {
            background: none;
            border: 1px solid #2d3f55;
            color: #475569;
            border-radius: 4px;
            padding: 1px 5px;
            font-size: .62rem;
            cursor: pointer;
            line-height: 1.4;
        }

        .edit-btn:hover { border-color: #38bdf8; color: #38bdf8; }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 0px 5px;
            border-radius: 999px;
            font-size: .6rem;
            font-weight: 700;
            line-height: 1.5;
        }

        .badge.HIGH    { background: #ef444422; color: #f87171; }
        .badge.LOW     { background: #22c55e22; color: #4ade80; }
        .badge.online  { background: #22c55e20; color: #4ade80; }
        .badge.offline-b { background: #33415520; color: #64748b; }

        /* ── Sensor grid in card ── */
        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .3rem;
            margin-bottom: .35rem;
        }

        .sensor-box {
            background: #0f172a;
            border-radius: 6px;
            padding: .28rem .38rem;
        }

        .sensor-lbl {
            font-size: .58rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .sensor-row-val {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-top: 1px;
        }

        .sensor-num {
            font-size: .78rem;
            font-weight: 700;
            color: #e2e8f0;
            font-variant-numeric: tabular-nums;
        }

        .trend { font-size: .68rem; line-height: 1; }
        .trend.up   { color: #f87171; }
        .trend.dn   { color: #4ade80; }
        .trend.st   { color: #334155; }

        /* Mini gauge */
        .gauge-bar {
            height: 3px;
            background: #1e293b;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 3px;
        }

        .gauge-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .6s ease;
        }

        .gauge-fill.g-normal  { background: #22c55e; }
        .gauge-fill.g-warn    { background: #f59e0b; }
        .gauge-fill.g-danger  { background: #ef4444; }

        /* ── Card footer ── */
        .dcard-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .last-seen { font-size: .6rem; color: #334155; }

        .risk-lbl { font-size: .62rem; font-weight: 600; }
        .risk-lbl.normal { color: #4ade80; }
        .risk-lbl.warn   { color: #fbbf24; }
        .risk-lbl.danger { color: #f87171; }
        .risk-lbl.offline { color: #475569; }

        /* ── Main content area ── */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* ── Chart panel ── */
        #chart-panel {
            flex: 1.4;
            min-height: 0;
            padding: .55rem .75rem;
            border-bottom: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            margin-bottom: .35rem;
        }

        .panel-title { font-size: .8rem; font-weight: 600; color: #f1f5f9; }

        #chart-sub {
            font-size: .68rem;
            color: #38bdf8;
            margin-left: .35rem;
        }

        .chart-limits { display: flex; gap: .25rem; }

        .chart-limits button {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 2px 7px;
            border-radius: 5px;
            font-size: .65rem;
            cursor: pointer;
        }

        .chart-limits button.active,
        .chart-limits button:hover {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        .chart-mode { display: flex; gap: .25rem; }

        .chart-mode button {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 2px 9px;
            border-radius: 5px;
            font-size: .65rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .04em;
        }

        .chart-mode button.active,
        .chart-mode button:hover {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }

        .chart-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .chart-stats {
            display: flex;
            gap: .75rem;
            margin-top: .3rem;
            flex-shrink: 0;
        }

        .chart-stat { font-size: .65rem; color: #475569; }
        .chart-stat b { color: #64748b; }

        /* ── Bottom row ── */
        #bottom-row {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .panel {
            padding: .55rem .75rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #map-panel { border-right: 1px solid #1e293b; }

        #map {
            flex: 1;
            min-height: 0;
            border-radius: 7px;
            overflow: hidden;
        }

        .map-legend {
            display: flex;
            gap: .6rem;
            margin-top: .3rem;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .map-legend-item {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: .6rem;
            color: #475569;
        }

        .dot-legend {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.25);
            flex-shrink: 0;
        }

        #log-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: .25rem;
        }

        .log-entry {
            border-left: 2px solid #1e293b;
            padding: .22rem .5rem;
            flex-shrink: 0;
        }

        .log-entry.log-warn   { border-color: #f59e0b; }
        .log-entry.log-danger { border-color: #ef4444; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

        /* ── Modal ── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #00000088;
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        #modal-overlay.open { display: flex; }

        #modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 13px;
            padding: 1.4rem;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        #modal h2 { font-size: .95rem; margin-bottom: .9rem; color: #f1f5f9; }

        .form-group { margin-bottom: .7rem; }

        .form-group label {
            display: block;
            font-size: .75rem;
            color: #94a3b8;
            margin-bottom: 3px;
        }

        .form-group input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 7px;
            padding: .38rem .6rem;
            font-size: .83rem;
        }

        .form-group input:focus { outline: none; border-color: #38bdf8; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: .45rem;
            margin-top: .8rem;
        }

        .btn-cancel {
            background: #334155;
            border: none;
            color: #cbd5e1;
            padding: .38rem .85rem;
            border-radius: 7px;
            cursor: pointer;
            font-size: .82rem;
        }

        .btn-save {
            background: #38bdf8;
            border: none;
            color: #0f172a;
            padding: .38rem .85rem;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 700;
            font-size: .82rem;
        }

        .btn-save:hover { background: #7dd3fc; }

        #modal-close {
            position: absolute;
            top: .75rem;
            right: .85rem;
            background: none;
            border: none;
            color: #64748b;
            font-size: 1rem;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-title">💧 Water Level Monitor <span>Real-time Dashboard</span></div>
        <div id="conn"><span id="dot"></span><span id="conn-label">Connecting…</span></div>
    </header>

    <div id="stats-bar">
        <div class="stat-item">
            <span class="stat-label">Perangkat</span>
            <span class="stat-val" id="s-total">0</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">Online</span>
            <span class="stat-val ok" id="s-online">0</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">Offline</span>
            <span class="stat-val off" id="s-offline">0</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">🚨 Alert</span>
            <span class="stat-val danger" id="s-alert">0</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">Threshold</span>
            <span class="stat-val">500</span>
        </div>
        <span id="clock"></span>
    </div>

    <div id="workspace">

        <!-- Sidebar: device cards -->
        <aside id="sidebar">
            <div class="sidebar-hdr">Perangkat</div>
            <div id="device-list"></div>
        </aside>

        <!-- Main content -->
        <div id="main-content">

            <!-- Chart panel -->
            <div id="chart-panel">
                <div class="panel-hdr">
                    <div>
                        <span class="panel-title">📈 Histori Sensor</span>
                        <span id="chart-sub">Semua perangkat · MIN</span>
                    </div>
                    <div style="display:flex;gap:.4rem;align-items:center">
                        <div class="chart-mode">
                            <button data-mode="min" class="active">MIN</button>
                            <button data-mode="max">MAX</button>
                        </div>
                        <div class="chart-limits">
                            <button data-limit="20" class="active">20</button>
                            <button data-limit="50">50</button>
                            <button data-limit="100">100</button>
                        </div>
                    </div>
                </div>
                <div class="chart-wrap">
                    <canvas id="sensorChart"></canvas>
                </div>
                <div class="chart-stats" id="chart-stats"></div>
            </div>

            <!-- Bottom: Map + Log -->
            <div id="bottom-row">
                <div class="panel" id="map-panel">
                    <div class="panel-hdr" style="margin-bottom:.3rem">
                        <span class="panel-title">🗺️ Lokasi Perangkat</span>
                    </div>
                    <div id="map"></div>
                    <div class="map-legend">
                        <div class="map-legend-item"><div class="dot-legend" style="background:#ef4444"></div>Bahaya</div>
                        <div class="map-legend-item"><div class="dot-legend" style="background:#f59e0b"></div>Waspada</div>
                        <div class="map-legend-item"><div class="dot-legend" style="background:#22c55e"></div>Normal</div>
                        <div class="map-legend-item"><div class="dot-legend" style="background:#475569"></div>Offline</div>
                    </div>
                </div>

                <div class="panel" id="log-panel">
                    <div class="panel-hdr" style="margin-bottom:.3rem">
                        <span class="panel-title">📋 Log Aktivitas</span>
                    </div>
                    <div id="log-list">
                        <span style="color:#334155;font-size:.72rem">Menunggu data…</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Edit device modal -->
    <div id="modal-overlay">
        <div id="modal">
            <button id="modal-close">✕</button>
            <h2>Edit Perangkat</h2>
            <input type="hidden" id="f-device-id" />
            <div class="form-group">
                <label>Nama Perangkat</label>
                <input type="text" id="f-name" placeholder="cth: Pos Pantau Sungai A" />
            </div>
            <div class="form-group">
                <label>Lokasi / Keterangan</label>
                <input type="text" id="f-location" placeholder="cth: Jembatan Barat, Kab. Xxx" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Latitude</label>
                    <input type="number" id="f-lat" step="any" placeholder="-6.200000" />
                </div>
                <div class="form-group">
                    <label>Longitude</label>
                    <input type="number" id="f-lng" step="any" placeholder="106.816666" />
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modal-cancel">Batal</button>
                <button class="btn-save" id="modal-save">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const THRESHOLD = 500;
        const OFFLINE_MS = 30_000;
        const deviceMap = {};
        const prevValues = {}; // { deviceId: { sensor_min, sensor_max } }
        let activeDevice = null;
        let chartLimit = 20;
        let chartMode    = 'min'; // 'min' | 'max'
        const chartBuffers = {}; // { deviceId: { times: string[], values: number[] } }
        const PALETTE  = [
            '#38bdf8', '#f59e0b', '#4ade80', '#f87171', '#a78bfa',
            '#fb923c', '#34d399', '#60a5fa', '#f472b6', '#facc15',
        ];

        // ── Clock ─────────────────────────────────────────────────────
        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ── Map ───────────────────────────────────────────────────────
        const leafMap = L.map('map', { zoomControl: true }).setView([-2.5, 118], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors', maxZoom: 18,
        }).addTo(leafMap);
        const markers = {};

        function markerColor(d) {
            if (!d || !isOnline(d)) return '#475569';
            if (d.sensor_min_status === 'HIGH' && d.sensor_max_status === 'HIGH') return '#ef4444';
            if (d.sensor_min_status === 'HIGH') return '#f59e0b';
            return '#22c55e';
        }

        function updateMarker(d) {
            if (!d.lat || !d.lng) return;
            const col = markerColor(d);
            const online = isOnline(d);
            const glow = online ? `box-shadow:0 0 0 3px ${col}40,0 0 8px ${col}55` : '';
            const icon = L.divIcon({
                className: '',
                html: `<div style="width:12px;height:12px;border-radius:50%;background:${col};border:2px solid #fff;${glow}"></div>`,
                iconSize: [12, 12], iconAnchor: [6, 6],
            });
            if (markers[d.device_id]) {
                markers[d.device_id].setLatLng([d.lat, d.lng]).setIcon(icon);
            } else {
                markers[d.device_id] = L.marker([d.lat, d.lng], { icon }).addTo(leafMap);
                markers[d.device_id].bindPopup('');
            }
            const st = online ? '🟢 Online' : '🔴 Offline';
            markers[d.device_id].setPopupContent(
                `<b>${d.name || d.device_id}</b> <span style="font-size:.8em">${st}</span><br>
                 ${d.location || ''}<br>
                 <small>MIN: ${d.sensor_min ?? '—'} <b>${d.sensor_min_status || ''}</b></small><br>
                 <small>MAX: ${d.sensor_max ?? '—'} <b>${d.sensor_max_status || ''}</b></small><br>
                 <small>Risiko: <b>${riskLabel(d)}</b></small><br>
                 <small style="color:#888">${d.received_at ? fmt(d.received_at) : ''}</small>`
            );
        }

        function fitMap() {
            const pts = Object.values(markers).map(m => m.getLatLng()).filter(Boolean);
            if (pts.length) leafMap.fitBounds(L.latLngBounds(pts), { padding: [30, 30], maxZoom: 15 });
        }

        // ── Chart ─────────────────────────────────────────────────────
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [], // populated dynamically per device
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 200 },
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { labels: { color: '#64748b', boxWidth: 10, font: { size: 10 } } },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        titleColor: '#f1f5f9',
                        bodyColor: '#94a3b8',
                        borderColor: '#334155',
                        borderWidth: 1,
                        callbacks: {
                            afterLabel: i => `  Status: ${i.raw > THRESHOLD ? '🔴 HIGH' : '🟢 LOW'}`,
                        },
                    },
                },
                scales: {
                    x: {
                        ticks: { color: '#334155', maxRotation: 30, font: { size: 9 }, maxTicksLimit: 8 },
                        grid: { color: '#1a2840' },
                    },
                    y: {
                        ticks: { color: '#475569', font: { size: 9 } },
                        grid: { color: '#1e293b' },
                        title: { display: true, text: 'Nilai Sensor (raw)', color: '#334155', font: { size: 9 } },
                    },
                },
            },
            plugins: [{
                // Draw threshold dashed line at y = THRESHOLD
                id: 'threshold-line',
                afterDraw(chart) {
                    const { ctx, chartArea, scales: { y } } = chart;
                    if (!chartArea) return;
                    const yPos = y.getPixelForValue(THRESHOLD);
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(chartArea.left, yPos);
                    ctx.lineTo(chartArea.right, yPos);
                    ctx.strokeStyle = '#ef444460';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 4]);
                    ctx.stroke();
                    ctx.fillStyle = '#ef4444aa';
                    ctx.font = '9px sans-serif';
                    ctx.fillText(`THRESHOLD ${THRESHOLD}`, chartArea.right - 84, yPos - 3);
                    ctx.restore();
                },
            }],
        });

        // ── Helpers ───────────────────────────────────────────────────
        function isOnline(d) {
            if (!d?.received_at) return false;
            return (Date.now() - new Date(d.received_at).getTime()) < OFFLINE_MS;
        }

        function fmt(dt) {
            return new Date(dt).toLocaleTimeString('id-ID', {
                hour: '2-digit', minute: '2-digit', second: '2-digit',
            });
        }

        function badge(s) {
            return s ? `<span class="badge ${s}">${s}</span>` : '';
        }

        function riskLabel(d) {
            if (!d || !isOnline(d)) return 'Offline';
            if (d.sensor_min_status === 'HIGH' && d.sensor_max_status === 'HIGH') return 'Bahaya';
            if (d.sensor_min_status === 'HIGH') return 'Waspada';
            return 'Normal';
        }

        function riskClass(d) {
            if (!d || !isOnline(d)) return 'offline';
            if (d.sensor_min_status === 'HIGH' && d.sensor_max_status === 'HIGH') return 'danger';
            if (d.sensor_min_status === 'HIGH') return 'warn';
            return 'normal';
        }

        function trendOf(id, field) {
            const prev = prevValues[id]?.[field];
            const curr = deviceMap[id]?.[field];
            if (prev == null || curr == null) return { arrow: '', cls: 'st' };
            const d = curr - prev;
            if (d > 5)  return { arrow: '↑', cls: 'up' };
            if (d < -5) return { arrow: '↓', cls: 'dn' };
            return { arrow: '→', cls: 'st' };
        }

        function gaugePercent(val) {
            if (val == null) return 0;
            return Math.min(Math.round((val / (THRESHOLD * 1.6)) * 100), 100);
        }

        function gaugeClass(val) {
            if (val == null) return 'g-normal';
            if (val > THRESHOLD)         return 'g-danger';
            if (val > THRESHOLD * 0.75)  return 'g-warn';
            return 'g-normal';
        }

        // ── Stats bar ─────────────────────────────────────────────────
        function updateStats() {
            const devs = Object.values(deviceMap);
            const total   = devs.length;
            const online  = devs.filter(isOnline).length;
            const offline = total - online;
            const alert   = devs.filter(d =>
                isOnline(d) && (d.sensor_min_status === 'HIGH' || d.sensor_max_status === 'HIGH')
            ).length;
            document.getElementById('s-total').textContent   = total;
            document.getElementById('s-online').textContent  = online;
            document.getElementById('s-offline').textContent = offline;
            document.getElementById('s-alert').textContent   = alert;
        }

        // ── Device cards (event delegation) ───────────────────────────
        document.getElementById('device-list').addEventListener('click', e => {
            const card = e.target.closest('.dcard');
            if (!card) return;
            const id = card.dataset.id;
            if (e.target.closest('[data-edit]')) {
                openModal(id);
                return;
            }
            selectDevice(id);
        });

        function renderCards() {
            const list = document.getElementById('device-list');
            const ids  = Object.keys(deviceMap);

            if (!ids.length) {
                list.innerHTML = '<p style="color:#334155;font-size:.72rem;padding:.3rem">Menunggu data…</p>';
                updateStats();
                return;
            }

            for (const id of ids) {
                const d    = deviceMap[id];
                const on   = isOnline(d);
                const rc   = riskClass(d);
                const rl   = riskLabel(d);
                const tMin = trendOf(id, 'sensor_min');
                const tMax = trendOf(id, 'sensor_max');

                let card = list.querySelector(`.dcard[data-id="${id}"]`);
                if (!card) {
                    card = document.createElement('div');
                    card.className = 'dcard';
                    card.dataset.id = id;
                    list.appendChild(card);
                }

                card.className = ['dcard',
                    id === activeDevice ? 'active' : '',
                    !on ? 'offline' : '',
                    rc === 'danger' ? 'risk-danger' : rc === 'warn' ? 'risk-warn' : '',
                ].filter(Boolean).join(' ');

                card.innerHTML = `
                <div class="dcard-top">
                    <div>
                        <div class="dcard-name" title="${d.name || id}">${d.name || id}</div>
                        <div class="dcard-id">${id}</div>
                    </div>
                    <div class="dcard-actions">
                        <span class="badge ${on ? 'online' : 'offline-b'}">${on ? '● Live' : '○ Off'}</span>
                        <button class="edit-btn" data-edit="${id}">✏</button>
                    </div>
                </div>
                <div class="sensor-grid">
                    <div class="sensor-box">
                        <div class="sensor-lbl">MIN</div>
                        <div class="sensor-row-val">
                            <span class="sensor-num">${d.sensor_min ?? '—'}</span>
                            ${badge(d.sensor_min_status)}
                            <span class="trend ${tMin.cls}">${tMin.arrow}</span>
                        </div>
                        <div class="gauge-bar">
                            <div class="gauge-fill ${gaugeClass(d.sensor_min)}"
                                 style="width:${gaugePercent(d.sensor_min)}%"></div>
                        </div>
                    </div>
                    <div class="sensor-box">
                        <div class="sensor-lbl">MAX</div>
                        <div class="sensor-row-val">
                            <span class="sensor-num">${d.sensor_max ?? '—'}</span>
                            ${badge(d.sensor_max_status)}
                            <span class="trend ${tMax.cls}">${tMax.arrow}</span>
                        </div>
                        <div class="gauge-bar">
                            <div class="gauge-fill ${gaugeClass(d.sensor_max)}"
                                 style="width:${gaugePercent(d.sensor_max)}%"></div>
                        </div>
                    </div>
                </div>
                <div class="dcard-footer">
                    <span class="last-seen">${d.received_at ? fmt(d.received_at) : '—'}</span>
                    <span class="risk-lbl ${rc}">${rl}</span>
                </div>`;
            }

            // Remove stale cards
            list.querySelectorAll('.dcard').forEach(c => {
                if (!deviceMap[c.dataset.id]) c.remove();
            });

            updateStats();
        }

        // ── Chart: ring buffer per device ─────────────────────────────
        // Each device keeps its own fixed-size buffer of { time, value }.
        // The chart uses a category (index-based) x-axis so historical data
        // and live SSE data never create time-gap distortions.

        async function loadChart() {
            const ids   = Object.keys(deviceMap);
            const field = `sensor_${chartMode}`;
            document.getElementById('chart-sub').textContent =
                `Semua perangkat · ${chartMode.toUpperCase()}`;
            if (!ids.length) return;

            const results = await Promise.all(
                ids.map(id =>
                    fetch(`/api/sensors/${encodeURIComponent(id)}?limit=${chartLimit}`)
                        .then(r => r.json())
                        .then(j => ({ id, rows: (j.data || []).reverse() }))
                )
            );

            // Fill ring buffers from historical data
            for (const { id, rows } of results) {
                chartBuffers[id] = {
                    times:  rows.map(r => fmt(r.received_at)),
                    values: rows.map(r => r[field] ?? null),
                };
            }

            rebuildChart();
            renderChartStats();
        }

        // Rebuild chart entirely from buffers — no fetch.
        // Called after loadChart, SSE update, mode/limit change, or device select.
        function rebuildChart() {
            const ids = Object.keys(chartBuffers);
            if (!ids.length) return;

            // X-axis labels come from the active (or first) device's time buffer
            const refId = (activeDevice && chartBuffers[activeDevice])
                ? activeDevice : ids[0];
            chart.data.labels = [...(chartBuffers[refId]?.times || [])];

            chart.data.datasets = ids.map((id, i) => {
                const col      = PALETTE[i % PALETTE.length];
                const isActive = id === activeDevice;
                const buf      = chartBuffers[id] || { values: [] };
                return {
                    label:           deviceMap[id]?.name || id,
                    deviceId:        id,
                    data:            [...buf.values],   // plain numbers, not {x,y}
                    borderColor:     isActive ? col : col + '88',
                    backgroundColor: col + '10',
                    tension:         .35,
                    fill:            false,
                    pointRadius:     isActive ? 3 : 1,
                    borderWidth:     isActive ? 2.5 : 1,
                };
            });

            chart.update('none');
        }

        function renderChartStats() {
            const el   = document.getElementById('chart-stats');
            const vals = Object.values(chartBuffers)
                .flatMap(buf => buf.values)
                .filter(v => v != null);
            if (!vals.length) { el.innerHTML = ''; return; }
            const avg = (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
            const lo  = Math.min(...vals).toFixed(0);
            const hi  = Math.max(...vals).toFixed(0);
            const lbl = chartMode === 'min' ? 'MIN' : 'MAX';
            const col = chartMode === 'min' ? '#38bdf870' : '#f59e0b70';
            el.innerHTML = `
                <span class="chart-stat" style="color:${col}">Sensor ${lbl} semua perangkat →</span>
                <span class="chart-stat">avg <b>${avg}</b> · lo <b>${lo}</b> · hi <b>${hi}</b></span>`;
        }

        function selectDevice(id) {
            activeDevice = id;
            rebuildChart(); // re-render highlighting without fetch
            renderCards();
            const d = deviceMap[id];
            if (d?.lat && d?.lng) leafMap.setView([d.lat, d.lng], 14);
        }

        // ── SSE ───────────────────────────────────────────────────────
        function connectSSE() {
            const es = new EventSource('/events');
            es.onopen = () => {
                document.getElementById('dot').classList.add('ok');
                document.getElementById('conn-label').textContent = 'Live';
            };
            es.onerror = () => {
                document.getElementById('dot').classList.remove('ok');
                document.getElementById('conn-label').textContent = 'Reconnecting…';
            };
            es.onmessage = e => {
                const d  = JSON.parse(e.data);
                const id = d.device_id;
                // Track previous values for trend arrows
                if (deviceMap[id]) {
                    prevValues[id] = {
                        sensor_min: deviceMap[id].sensor_min,
                        sensor_max: deviceMap[id].sensor_max,
                    };
                }
                deviceMap[id] = { ...(deviceMap[id] || {}), ...d };
                renderCards();
                updateMarker(deviceMap[id]);
                pushLog(deviceMap[id]);
                // Push new point into this device's ring buffer then redraw
                const field = `sensor_${chartMode}`;
                if (chartBuffers[id]) {
                    chartBuffers[id].times.push(fmt(d.received_at));
                    chartBuffers[id].values.push(d[field] ?? null);
                    if (chartBuffers[id].times.length > chartLimit) {
                        chartBuffers[id].times.shift();
                        chartBuffers[id].values.shift();
                    }
                } else {
                    // First reading from a new device — init buffer and reload
                    chartBuffers[id] = {
                        times:  [fmt(d.received_at)],
                        values: [d[field] ?? null],
                    };
                }
                rebuildChart();
                renderChartStats();
            };
        }

        // ── Log ───────────────────────────────────────────────────────
        const logEntries = [];

        function pushLog(d) {
            logEntries.unshift({
                device_id:          d.device_id,
                name:               d.name,
                sensor_min:         d.sensor_min,
                sensor_min_status:  d.sensor_min_status,
                sensor_max:         d.sensor_max,
                sensor_max_status:  d.sensor_max_status,
                time:               d.received_at,
            });
            if (logEntries.length > 50) logEntries.pop();
            renderLog();
        }

        function renderLog() {
            const el = document.getElementById('log-list');
            if (!logEntries.length) {
                el.innerHTML = '<span style="color:#334155;font-size:.72rem">Menunggu data…</span>';
                return;
            }
            el.innerHTML = logEntries.map(e => {
                const isDanger = e.sensor_min_status === 'HIGH' && e.sensor_max_status === 'HIGH';
                const isWarn   = !isDanger && (e.sensor_min_status === 'HIGH' || e.sensor_max_status === 'HIGH');
                const cls      = isDanger ? 'log-danger' : isWarn ? 'log-warn' : '';
                return `<div class="log-entry ${cls}" style="font-size:.68rem;color:#64748b">
                    <span style="color:#38bdf8;font-weight:600">${e.name || e.device_id}</span>
                    <span style="color:#334155;margin-left:4px">${fmt(e.time)}</span><br>
                    MIN <b style="color:#cbd5e1">${e.sensor_min ?? '—'}</b>${badge(e.sensor_min_status)}
                    &nbsp;MAX <b style="color:#cbd5e1">${e.sensor_max ?? '—'}</b>${badge(e.sensor_max_status)}
                </div>`;
            }).join('');
        }

        // ── Periodic offline refresh (every 5 s) ──────────────────────
        setInterval(() => {
            for (const id of Object.keys(deviceMap)) updateMarker(deviceMap[id]);
            renderCards();
        }, 5000);

        // ── Chart mode buttons (MIN / MAX) ────────────────────────────
        document.querySelectorAll('.chart-mode button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chart-mode button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartMode = btn.dataset.mode;
                loadChart();
            });
        });

        // ── Chart limit buttons ───────────────────────────────────────
        document.querySelectorAll('.chart-limits button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chart-limits button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartLimit = parseInt(btn.dataset.limit);
                loadChart();
            });
        });

        // ── Modal ─────────────────────────────────────────────────────
        function openModal(deviceId) {
            const d = deviceMap[deviceId] || {};
            document.getElementById('f-device-id').value  = deviceId;
            document.getElementById('f-name').value       = d.name     || '';
            document.getElementById('f-location').value   = d.location || '';
            document.getElementById('f-lat').value        = d.lat      || '';
            document.getElementById('f-lng').value        = d.lng      || '';
            document.getElementById('modal-overlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
        }

        document.getElementById('modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('modal-overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('modal-overlay')) closeModal();
        });

        document.getElementById('modal-save').addEventListener('click', async () => {
            const device_id = document.getElementById('f-device-id').value;
            const body = {
                name:     document.getElementById('f-name').value.trim()     || null,
                location: document.getElementById('f-location').value.trim() || null,
                lat:      parseFloat(document.getElementById('f-lat').value)  || null,
                lng:      parseFloat(document.getElementById('f-lng').value)  || null,
            };
            const res  = await fetch(`/api/devices/${encodeURIComponent(device_id)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const json = await res.json();
            if (json.success) {
                deviceMap[device_id] = { ...(deviceMap[device_id] || {}), ...json.data };
                renderCards();
                updateMarker(deviceMap[device_id]);
                fitMap();
                closeModal();
            }
        });

        // ── Init ──────────────────────────────────────────────────────
        async function init() {
            try {
                const res  = await fetch('/api/sensors/latest');
                const json = await res.json();
                for (const row of json.data || []) {
                    deviceMap[row.device_id] = row;
                    updateMarker(row);
                }
                renderCards();
                fitMap();
                setTimeout(() => leafMap.invalidateSize(), 150);
                loadChart();
                const first = Object.keys(deviceMap)[0];
                if (first) selectDevice(first);
            } catch (e) {
                console.error('Init error', e);
            }
            connectSSE();
        }

        init();
    </script>
</body>

</html>
