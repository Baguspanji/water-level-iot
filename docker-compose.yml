services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log

  water-level-server:
    build: .
    container_name: water-level-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-water-level-server}
      MQTT_TOPIC_SENSOR: ${MQTT_TOPIC_SENSOR:-sensors/water-level}
      HTTP_PORT: ${HTTP_PORT:-3000}
      DB_PATH: /app/data/water_sensor.db
    volumes:
      - sensor_data:/app/data
    depends_on:
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_logs:
  sensor_data:
